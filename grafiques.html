<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#12624c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Despeses Viatges · Gràfiques</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#18332c;background:#f2f6f4;--g:#12624c;--soft:#e5f0ec;--line:#d4e0dc;--red:#a33a32}
*{box-sizing:border-box}body{margin:0;max-width:820px;margin:auto;padding:env(safe-area-inset-top) 12px calc(90px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:5;background:#f2f6f4ee;backdrop-filter:blur(12px);padding:13px 0 8px}
h1{font-size:24px;margin:0}.sub{font-size:12px;color:#647770;margin-top:3px}.card{background:white;border-radius:17px;padding:14px;margin:10px 0;box-shadow:0 2px 12px #0c3f3010}
.btn{border:0;border-radius:12px;padding:12px;font-size:15px;font-weight:750}.primary{background:var(--g);color:#fff}.secondary{background:var(--soft);color:var(--g)}.danger{background:#fbe9e7;color:var(--red)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.full{grid-column:1/-1}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:block;font-size:12px;font-weight:750;color:#526963;margin-bottom:4px}input,select,textarea{width:100%;font-size:16px;border:1px solid #cad8d4;border-radius:11px;padding:11px;background:#fff}textarea{min-height:65px}
.trip{display:grid;grid-template-columns:1fr auto;gap:8px;padding:13px 0;border-bottom:1px solid #edf2f0}.trip:last-child{border:0}.tripName{font-weight:800;font-size:17px}.meta{font-size:12px;color:#6a7d78;margin-top:3px}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:#e7efec;padding:5px;border-radius:14px}.tab{border:0;background:transparent;padding:10px 4px;border-radius:10px;font-weight:700;color:#536963}.tab.active{background:#fff;color:var(--g);box-shadow:0 1px 5px #00000012}
.page{display:none}.page.active{display:block}.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px}.metric{background:var(--soft);border-radius:13px;padding:12px}.metric span{font-size:12px;color:#657872}.metric b{display:block;font-size:21px;margin-top:3px}
.participants{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:11px;padding:9px}.check input{width:auto}
.expense{display:grid;grid-template-columns:1fr auto;gap:8px;padding:12px 0;border-bottom:1px solid #edf2f0}.amount{text-align:right;font-weight:800}.pill{display:inline-block;background:#edf4f1;border-radius:999px;padding:3px 7px;margin:4px 3px 0 0;font-size:11px}
.balance{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #edf2f0}.positive{color:#147a55}.negative{color:#b04136}.empty{text-align:center;color:#71847f;padding:22px}.hidden{display:none}.small{font-size:12px;color:#647770}.back{border:0;background:transparent;color:var(--g);font-weight:800;padding:0 0 8px}.settlement{padding:9px 0;border-bottom:1px solid #edf2f0}
.chart{margin-top:12px}
.chartRow{display:grid;grid-template-columns:minmax(90px,1.1fr) 2.2fr auto;gap:8px;align-items:center;margin:9px 0}
.chartLabel{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chartTrack{height:13px;background:#e9f0ed;border-radius:999px;overflow:hidden}
.chartBar{height:100%;background:var(--g);border-radius:999px;min-width:2px}
.chartValue{font-size:12px;font-weight:800;text-align:right;white-space:nowrap}
.chartEmpty{text-align:center;color:#71847f;padding:18px 0}
@media(max-width:480px){.grid{grid-template-columns:1fr}.full{grid-column:auto}}
</style>
</head>
<body>
<header>
<button id="backBtn" class="back hidden">‹ Tots els viatges</button>
<h1 id="title">✈️ Despeses Viatges</h1>
<div id="subtitle" class="sub">Versió amb gràfiques · dades guardades al dispositiu</div>
</header>

<section id="home">
<div class="card">
  <button id="newTripBtn" class="btn primary" style="width:100%">＋ Nou viatge</button>
</div>
<div class="card"><b>Els meus viatges</b><div id="tripList"></div></div>
</section>

<section id="tripView" class="hidden">
<div class="tabs"><button class="tab active" data-page="expensesPage">Despeses</button><button class="tab" data-page="summaryPage">Resum</button><button class="tab" data-page="settingsPage">Configuració</button></div>

<div id="expensesPage" class="page active">
<div class="card metrics"><div class="metric"><span>Total</span><b id="total">0,00 €</b></div><div class="metric"><span>Nombre</span><b id="count">0</b></div></div>
<div class="card"><form id="expenseForm" class="grid">
<div><label>Data</label><input id="date" type="date" required></div><div><label>Import</label><input id="amount" type="number" step="0.01" min="0" inputmode="decimal" required></div>
<div class="full"><label>Concepte</label><input id="concept" required placeholder="Restaurant, gasolina, hotel…"></div>
<div><label>Categoria</label><select id="category"></select></div><div><label>Pagat per</label><select id="paidBy"></select></div>
<div class="full"><label>Repartir entre</label><div id="participantChecks" class="participants"></div></div>
<div><label>Forma de pagament</label><select id="payment"><option>Targeta</option><option>Efectiu</option><option>Transferència</option><option>Altres</option></select></div>
<div><label>Ciutat / lloc</label><input id="place"></div>
<div class="full"><label>Observacions</label><textarea id="notes"></textarea></div>
<div class="full"><button class="btn primary" type="submit" style="width:100%">Afegir despesa</button></div>
</form></div>
<div class="card"><div class="actions"><button class="btn secondary" id="importBtn">Importar Excel</button><button class="btn secondary" id="exportBtn">Exportar Excel</button></div><input class="hidden" id="fileInput" type="file" accept=".xlsx,.xls"></div>
<div class="card"><b>Despeses registrades</b><div id="expenseList"></div></div>
</div>

<div id="summaryPage" class="page">
<div class="card"><b>Despesa per categoria</b><div id="categoryChart" class="chart"></div></div>
<div class="card"><b>Import pagat per persona</b><div id="payerChart" class="chart"></div></div>
<div class="card"><b>Saldo de cada persona</b><div class="small">Positiu: ha avançat diners. Negatiu: deu diners.</div><div id="balances"></div></div>
<div class="card"><b>Liquidació proposada</b><div id="settlements"></div></div>
</div>

<div id="settingsPage" class="page">
<div class="card grid">
<div class="full"><label>Nom del viatge</label><input id="tripName"></div>
<div><label>Moneda</label><select id="currency"><option value="EUR">€ Euro</option><option value="ISK">ISK Corona islandesa</option><option value="USD">$ Dòlar</option><option value="GBP">£ Lliura</option></select></div>
<div class="full"><label>Participants, separats per comes</label><textarea id="participantsText"></textarea></div>
<div class="full"><button id="saveSettings" class="btn primary" style="width:100%">Guardar configuració</button></div>
<div class="full"><button id="deleteTrip" class="btn danger" style="width:100%">Eliminar aquest viatge</button></div>
</div>
</div>
</section>

<div id="tripModal" class="hidden">
<div class="card" style="position:fixed;z-index:20;left:12px;right:12px;top:20%;max-width:500px;margin:auto">
<h2 style="margin-top:0">Nou viatge</h2>
<div class="grid"><div class="full"><label>Nom</label><input id="newTripName" placeholder="Islàndia 2026"></div><div><label>Moneda</label><select id="newCurrency"><option value="EUR">€ Euro</option><option value="ISK">ISK</option><option value="USD">$ Dòlar</option></select></div><div class="full"><label>Participants</label><textarea id="newParticipants">Victor, Rosa, Núria, Abril</textarea></div></div>
<div class="actions" style="margin-top:12px"><button id="cancelTrip" class="btn secondary">Cancel·lar</button><button id="createTrip" class="btn primary">Crear</button></div>
</div></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
const $=id=>document.getElementById(id);
const STORE='despesesViatges_v1';
const categories=['Allotjament','Menjar i restaurants','Supermercat','Combustible','Transport','Aparcament','Ferris i peatges','Activitats i oci','Compres','Assegurança','Altres'];
let state=JSON.parse(localStorage.getItem(STORE)||'{"trips":[]}'), currentId=null;
const save=()=>localStorage.setItem(STORE,JSON.stringify(state));
const current=()=>state.trips.find(t=>t.id===currentId);
const money=(n,c='EUR')=>new Intl.NumberFormat('ca-ES',{style:'currency',currency:c}).format(Number(n)||0);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

function renderHome(){
 $('home').classList.remove('hidden');$('tripView').classList.add('hidden');$('backBtn').classList.add('hidden');$('title').textContent='✈️ Despeses Viatges';$('subtitle').textContent='Les dades es guarden en aquest dispositiu';
 const box=$('tripList');
 if(!state.trips.length){box.innerHTML='<div class="empty">Encara no hi ha cap viatge.</div>';return}
 box.innerHTML=state.trips.map(t=>`<div class="trip"><div><div class="tripName">${esc(t.name)}</div><div class="meta">${t.participants.length} participants · ${t.expenses.length} despeses · ${money(t.expenses.reduce((a,x)=>a+Number(x.amount||0),0),t.currency)}</div></div><button class="btn secondary" onclick="openTrip('${t.id}')">Obrir</button></div>`).join('');
}
window.openTrip=id=>{currentId=id;$('home').classList.add('hidden');$('tripView').classList.remove('hidden');$('backBtn').classList.remove('hidden');renderTrip()}
function renderTrip(){
 const t=current(); if(!t)return renderHome();
 $('title').textContent=t.name;$('subtitle').textContent='Guardat localment · '+t.participants.join(', ');
 $('category').innerHTML=categories.map(x=>`<option>${x}</option>`).join('');
 $('paidBy').innerHTML=t.participants.map(x=>`<option>${esc(x)}</option>`).join('');
 $('participantChecks').innerHTML=t.participants.map(x=>`<label class="check"><input type="checkbox" value="${esc(x)}" checked>${esc(x)}</label>`).join('');
 $('tripName').value=t.name;$('currency').value=t.currency;$('participantsText').value=t.participants.join(', ');
 $('date').value=new Date().toISOString().slice(0,10);
 renderExpenses();renderSummary();
}
function renderExpenses(){
 const t=current(), total=t.expenses.reduce((a,x)=>a+Number(x.amount||0),0);$('total').textContent=money(total,t.currency);$('count').textContent=t.expenses.length;
 $('expenseList').innerHTML=t.expenses.length?t.expenses.slice().reverse().map(x=>`<div class="expense"><div><b>${esc(x.concept)}</b><div class="meta">${esc(x.date)} · ${esc(x.category)} · pagat per ${esc(x.paidBy)}</div><div>${(x.sharedBy||[]).map(p=>`<span class="pill">${esc(p)}</span>`).join('')}</div></div><div class="amount">${money(x.amount,t.currency)}<br><button class="btn danger" style="padding:6px;margin-top:5px" onclick="removeExpense('${x.id}')">Eliminar</button></div></div>`).join(''):'<div class="empty">No hi ha despeses.</div>';
}
window.removeExpense=id=>{if(confirm('Eliminar aquesta despesa?')){const t=current();t.expenses=t.expenses.filter(x=>x.id!==id);save();renderTrip()}}
function balances(){
 const t=current(), b=Object.fromEntries(t.participants.map(p=>[p,0]));
 t.expenses.forEach(x=>{const a=Number(x.amount)||0, people=(x.sharedBy&&x.sharedBy.length?x.sharedBy:t.participants);if(!(x.paidBy in b))b[x.paidBy]=0;b[x.paidBy]+=a;const share=a/people.length;people.forEach(p=>{if(!(p in b))b[p]=0;b[p]-=share})});return b;
}
function renderBarChart(targetId, data, currency){
 const el=$(targetId), entries=Object.entries(data).filter(([,v])=>Number(v)>0).sort((a,b)=>b[1]-a[1]);
 if(!entries.length){el.innerHTML='<div class="chartEmpty">Encara no hi ha dades.</div>';return}
 const max=Math.max(...entries.map(([,v])=>Number(v)));
 el.innerHTML=entries.map(([label,value])=>`<div class="chartRow"><div class="chartLabel" title="${esc(label)}">${esc(label)}</div><div class="chartTrack"><div class="chartBar" style="width:${Math.max(2,(Number(value)/max)*100)}%"></div></div><div class="chartValue">${money(value,currency)}</div></div>`).join('');
}
function renderSummary(){
 const t=current(), b=balances();
 const byCategory={}, byPayer=Object.fromEntries(t.participants.map(p=>[p,0]));
 t.expenses.forEach(x=>{
   const amount=Number(x.amount)||0;
   const category=x.category||'Altres';
   byCategory[category]=(byCategory[category]||0)+amount;
   byPayer[x.paidBy]=(byPayer[x.paidBy]||0)+amount;
 });
 renderBarChart('categoryChart',byCategory,t.currency);
 renderBarChart('payerChart',byPayer,t.currency);
 $('balances').innerHTML=Object.entries(b).map(([p,v])=>`<div class="balance"><b>${esc(p)}</b><b class="${v>=0?'positive':'negative'}">${money(v,t.currency)}</b></div>`).join('');
 let debt=Object.entries(b).filter(([,v])=>v<-.005).map(([p,v])=>[p,-v]), cred=Object.entries(b).filter(([,v])=>v>.005).map(([p,v])=>[p,v]), out=[];
 let i=0,j=0;while(i<debt.length&&j<cred.length){let a=Math.min(debt[i][1],cred[j][1]);out.push(`${debt[i][0]} → ${cred[j][0]}: ${money(a,t.currency)}`);debt[i][1]-=a;cred[j][1]-=a;if(debt[i][1]<.005)i++;if(cred[j][1]<.005)j++}
 $('settlements').innerHTML=out.length?out.map(x=>`<div class="settlement">${esc(x)}</div>`).join(''):'<div class="empty">Els comptes estan equilibrats.</div>';
}
$('expenseForm').onsubmit=e=>{e.preventDefault();const t=current(), shared=[...document.querySelectorAll('#participantChecks input:checked')].map(x=>x.value);if(!shared.length)return alert('Selecciona almenys un participant.');
 t.expenses.push({id:uid(),date:$('date').value,amount:Number($('amount').value),concept:$('concept').value.trim(),category:$('category').value,paidBy:$('paidBy').value,sharedBy:shared,payment:$('payment').value,place:$('place').value.trim(),notes:$('notes').value.trim()});save();e.target.reset();renderTrip();};
$('newTripBtn').onclick=()=>$('tripModal').classList.remove('hidden');$('cancelTrip').onclick=()=>$('tripModal').classList.add('hidden');
$('createTrip').onclick=()=>{const name=$('newTripName').value.trim(),parts=$('newParticipants').value.split(',').map(x=>x.trim()).filter(Boolean);if(!name||!parts.length)return alert('Indica el nom i els participants.');
 const t={id:uid(),name,currency:$('newCurrency').value,participants:[...new Set(parts)],expenses:[]};state.trips.push(t);save();$('tripModal').classList.add('hidden');$('newTripName').value='';openTrip(t.id)};
$('backBtn').onclick=()=>{currentId=null;renderHome()};
$('saveSettings').onclick=()=>{const t=current(), parts=$('participantsText').value.split(',').map(x=>x.trim()).filter(Boolean);if(!parts.length)return alert('Cal almenys un participant.');t.name=$('tripName').value.trim()||t.name;t.currency=$('currency').value;t.participants=[...new Set(parts)];save();renderTrip();alert('Configuració guardada.')};
$('deleteTrip').onclick=()=>{if(confirm('Eliminar el viatge i totes les seves despeses?')){state.trips=state.trips.filter(x=>x.id!==currentId);save();currentId=null;renderHome()}};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.page).classList.add('active');if(b.dataset.page==='summaryPage')renderSummary()});
$('importBtn').onclick=()=>$('fileInput').click();
function parseNum(v){if(typeof v==='number')return v;let s=String(v??'').trim().replace(/\s|€/g,'');if(s.includes(',')&&s.includes('.'))s=s.lastIndexOf(',')>s.lastIndexOf('.')?s.replace(/\./g,'').replace(',','.'):s.replace(/,/g,'');else if(s.includes(','))s=s.replace(',','.');return Number(s)}
function parseDate(v){if(v instanceof Date&&!isNaN(v))return v.toISOString().slice(0,10);if(typeof v==='number'&&window.XLSX){const d=XLSX.SSF.parse_date_code(v);if(d)return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`};const s=String(v||'').trim(),m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);return m?`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`:s||new Date().toISOString().slice(0,10)}
$('fileInput').onchange=async e=>{const f=e.target.files[0];if(!f)return;if(!window.XLSX)return alert('Obre l’app amb connexió a Internet i torna-ho a provar.');
 const wb=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:true});let rows=null,header=-1;
 for(const sn of wb.SheetNames){const a=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:'',raw:true,cellDates:true});for(let i=0;i<Math.min(a.length,20);i++){const r=a[i].map(x=>String(x).toLowerCase());if(r.some(x=>x.includes('concepte'))&&r.some(x=>x.includes('import'))){rows=a;header=i;break}}if(rows)break}
 if(!rows)return alert('No he trobat les columnes Concepte i Import.');
 const h=rows[header].map(x=>String(x).trim().toLowerCase());const ix=s=>h.findIndex(x=>x.includes(s));const cDate=ix('data'),cConcept=ix('concepte'),cCat=ix('categoria'),cAmount=ix('import'),cPaid=ix('pagat per'),cPayment=ix('forma de pagament'),cPlace=ix('ciutat'),cNotes=ix('observ');
 const t=current();let added=0;for(const r of rows.slice(header+1)){const concept=String(r[cConcept]??'').trim(),amount=parseNum(r[cAmount]);if(!concept||!Number.isFinite(amount)||amount<=0)continue;let paid=String(cPaid>=0?r[cPaid]:'').trim();if(!t.participants.includes(paid))paid=t.participants[0];
 t.expenses.push({id:uid(),date:parseDate(cDate>=0?r[cDate]:''),concept,category:String(cCat>=0?r[cCat]:'Altres').trim()||'Altres',amount,paidBy:paid,sharedBy:[...t.participants],payment:String(cPayment>=0?r[cPayment]:'Targeta').trim()||'Targeta',place:String(cPlace>=0?r[cPlace]:'').trim(),notes:String(cNotes>=0?r[cNotes]:'').trim()});added++}
 save();renderTrip();alert(`Importades ${added} despeses.`);e.target.value=''};
$('exportBtn').onclick=()=>{if(!window.XLSX)return alert('Obre l’app amb connexió a Internet i torna-ho a provar.');const t=current();const rows=t.expenses.map(x=>({'Data':x.date,'Concepte':x.concept,'Categoria':x.category,'Import (€)':x.amount,'Pagat per':x.paidBy,'Forma de pagament':x.payment,'Ciutat / lloc':x.place,'Repartit entre':(x.sharedBy||[]).join(', '),'Observacions':x.notes}));const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'DESPESES');XLSX.writeFile(wb,`${t.name.replace(/[^\wÀ-ÿ-]+/g,'_')}.xlsx`)};

renderHome();
</script>
</body></html>
